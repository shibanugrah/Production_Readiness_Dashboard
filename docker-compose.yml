services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: production_readiness_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d production_readiness_dashboard",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/production_readiness_dashboard?schema=public"
      DEMO_SERVICE_HEALTH_ENABLED: "true"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
